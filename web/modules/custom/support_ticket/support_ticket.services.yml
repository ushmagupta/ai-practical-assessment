services:
  support_ticket.status:
    class: Drupal\support_ticket\TicketStatusService
  support_ticket.access:
    class: Drupal\support_ticket\TicketAccessService
    arguments: ['@support_ticket.status', '@entity_type.manager']
  support_ticket.ticket_transition_access:
    class: Drupal\support_ticket\Access\TicketTransitionAccess
    arguments: ['@support_ticket.status']
  support_ticket.route_subscriber:
    class: Drupal\support_ticket\EventSubscriber\TicketsRouteSubscriber
    tags:
      - { name: event_subscriber }
  support_ticket.frontpage_redirect_subscriber:
    class: Drupal\support_ticket\EventSubscriber\FrontpageRedirectSubscriber
    tags:
      - { name: event_subscriber }
