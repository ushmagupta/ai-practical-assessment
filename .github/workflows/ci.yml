name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: drupal
          MARIADB_USER: drupal
          MARIADB_PASSWORD: drupal
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, gd, pdo_mysql
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Prepare settings.php
        run: |
          cp web/sites/default/default.settings.php web/sites/default/settings.php
          chmod 777 web/sites/default

      - name: Install Drupal
        run: |
          vendor/bin/drush --root=web site:install standard \
            --db-url=mysql://drupal:drupal@127.0.0.1:3306/drupal \
            --site-name="Support Ticket System" \
            --account-name=admin \
            --account-pass=admin \
            -y

      - name: Enable custom module and theme
        run: |
          vendor/bin/drush --root=web en support_ticket -y
          vendor/bin/drush --root=web theme:enable support_ticket_theme -y
          vendor/bin/drush --root=web config:set system.theme default support_ticket_theme -y

      - name: Run PHPUnit
        run: vendor/bin/phpunit -c phpunit.xml
